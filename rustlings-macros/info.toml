# ERROR HANDLING

[[exercises]]
name = "errors1"
dir = "13_error_handling"
hint = """
`Ok` 和 `Err` 是 `Result` 的两个变体，因此测试的意思是：`generate_nametag_text` 应该返回 `Result`，而不是 `Option`。

要完成这一修改，你需要：
  - 将函数签名中的返回类型改为 `Result<String, String>`，它可以是 `Ok(String)` 或 `Err(String)`
  - 将函数体中当前返回 `Some(…)` 的位置改为返回 `Ok(…)`
  - 将函数体中当前返回 `None` 的位置改为返回 `Err(error message)`"""

[[exercises]]
name = "errors2"
dir = "13_error_handling"
hint = """
一种处理方式是对 `item_quantity.parse::<i32>()` 使用 `match` 语句，分支分别为 `Ok(something)` 和 `Err(something)`。

不过，这种模式在 Rust 中非常常见，因此 Rust 提供了 `?` 运算符，它基本上可以替你完成这个 match 语句的工作！

请阅读“错误处理”章节的这一部分：
https://doc.rust-lang.org/book/ch09-02-recoverable-errors-with-result.html#a-shortcut-for-propagating-errors-the--operator"""

[[exercises]]
name = "errors3"
dir = "13_error_handling"
test = false
hint = """
如果其他函数可以返回 `Result`，为什么 `main` 不可以呢？让 `main` 函数返回类似 `Result<(), ErrorType>` 的类型，是一种很常见的约定。

这里使用单元类型 `()`，是因为成功时实际上不需要返回任何内容。"""

[[exercises]]
name = "errors4"
dir = "13_error_handling"
hint = """
`PositiveNonzeroInteger::new` 总是创建新实例并返回 `Ok` 结果。但它应该执行一些检查：检查失败时返回 `Err`，只有在检查确认一切正常时才返回 `Ok` :)"""

[[exercises]]
name = "errors5"
dir = "13_error_handling"
test = false
hint = """
`main` 函数中会产生两种不同的 `Result` 类型，并通过 `?` 运算符传播。如何为 `main` 函数声明一个能够同时容纳两者的返回类型？

在底层，`?` 运算符会对错误值调用 `From::from`，将其转换为装箱的 trait 对象 `Box<dyn Error>`。这个装箱的 trait 对象具有多态性，由于所有错误都实现了 `Error` trait，我们可以用一个 `Box` 对象容纳许多不同的错误。

请阅读《Rust 程序设计语言》的这一部分：
https://doc.rust-lang.org/book/ch09-02-recoverable-errors-with-result.html#a-shortcut-for-propagating-errors-the--operator

进一步了解错误装箱：
https://doc.rust-lang.org/stable/rust-by-example/error/multiple_error_types/boxing_errors.html

进一步了解如何将 `?` 运算符与装箱错误一起使用：
https://doc.rust-lang.org/stable/rust-by-example/error/multiple_error_types/reenter_question_mark.html"""

[[exercises]]
name = "errors6"
dir = "13_error_handling"
hint = """

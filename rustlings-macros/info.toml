# STRINGS

[[exercises]]
name = "strings1"
dir = "09_strings"
test = false
hint = """
`current_favorite_color` 函数当前返回一个具有 `'static` 生命周期的字符串切片。我们知道这一点，是因为字符串数据直接存在于代码中——它不是来自文件、用户输入或其他程序——所以它会和程序一样长久存在。

但它仍然是字符串切片。《Rust 程序设计语言》的“字符串”章节介绍了一种通过转换字符串切片来创建 `String` 的方法，另一种方法则使用 `From` trait。"""

[[exercises]]
name = "strings2"
dir = "09_strings"

format_version = 1

welcome_message = """
这是你第一次使用 Rustlings 吗？别担心，Rustlings 面向初学者！
我们会带你学习许多 Rust 知识，不过在开始前，先了解 Rustlings 的运行方式：

1. Rustlings 的核心是完成练习。这些练习通常包含导致编译或测试失败的编译器错误或逻辑错误。你的任务是找出并修复所有错误！
2. 确保编辑器打开的是 `rustlings/` 目录。Rustlings 会在进度条下方显示当前练习路径。用编辑器打开练习文件，修复错误并保存。Rustlings 会自动检测文件变化并重新运行练习。修复所有错误后，Rustlings 会提示你进入下一个练习。
3. 如果你卡在某个练习上，输入 `h` 查看提示。
4. 如果某个练习不易理解，欢迎在 GitHub 上提交 issue（https://github.com/rust-lang/rustlings）。我们会查看每个 issue，其他学习者有时也会参与讨论，这样大家可以互相帮助！"""

final_message = """
希望你喜欢 Rust 的各个方面！
如果你发现任何问题，欢迎在 GitHub 上报告。
你也可以贡献自己编写的练习，帮助更广泛的 Rust 社区！

在报告问题或参与贡献之前，请先阅读我们的贡献指南：
https://github.com/rust-lang/rustlings/blob/main/CONTRIBUTING.md"""

# INTRO

[[exercises]]
name = "intro1"
dir = "00_intro"
test = false
skip_check_unsolved = true
hint = """
输入 `n` 进入下一个练习。
输入 `n` 后可能需要按 ENTER。"""

[[exercises]]
name = "intro2"
dir = "00_intro"
test = false
hint = """
编译器提示我们使用了错误的打印宏名称。
它还给出了一个可行的替代名称。"""

# VARIABLES

[[exercises]]
name = "variables1"
dir = "01_variables"
test = false
hint = """
`main` 函数中的声明缺少一个关键字；在 Rust 中创建新的变量绑定需要使用这个关键字。"""

[[exercises]]
name = "variables2"
dir = "01_variables"
test = false
hint = """
编译器消息表示，根据当前代码，Rust 无法推断变量绑定 `x` 的类型。

如果给 `main` 函数的第一行加上类型标注，会发生什么？

如果给 `x` 一个值呢？

如果两件事都做呢？

无论如何，`x` 应该是什么类型？

如果 `x` 和 `10` 是同一种类型呢？如果是不同类型呢？"""

[[exercises]]
name = "variables3"
dir = "01_variables"
test = false
hint = """
在这个练习中，我们在 `main` 函数中创建了一个变量绑定，并尝试在下一行使用它，但还没有给它赋值。

我们不能打印一个不存在的东西；试着给 `x` 一个值！

这是任何编程语言中都很容易犯、也可能导致 bug 的错误——幸好 Rust 编译器帮我们发现了它！"""

[[exercises]]
name = "variables4"
dir = "01_variables"
test = false
hint = """
在 Rust 中，变量绑定默认是不可变的。但这里我们试图给 `x` 重新赋一个不同的值！我们可以使用一个关键字，让变量绑定变成可变的。"""

[[exercises]]
name = "variables5"
dir = "01_variables"
test = false
hint = """
在 `variables4` 中，我们已经学会了使用特殊关键字将不可变变量变成可变变量。但这对本练习帮助不大，因为我们想给已有变量赋予不同类型的值。有时你也会希望重复使用已有的变量名，例如本练习中只是将值转换为不同类型。

幸运的是，Rust 为这个问题提供了一个强大的解决方案：“遮蔽（Shadowing）”！
你可以在《Rust 程序设计语言》的“变量和可变性”章节中进一步了解“遮蔽”：
https://doc.rust-lang.org/book/ch03-01-variables-and-mutability.html#shadowing

接下来试着使用这种技术解决本练习。"""

[[exercises]]
name = "variables6"
dir = "01_variables"
test = false
hint = """
我们已经了解了变量和可变性，但还有一种重要的变量类型：常量。

常量始终是不可变的。声明常量时使用关键字 `const`，而不是 `let`。

常量的类型必须始终显式标注。

请阅读《Rust 程序设计语言》“变量和可变性”章节中的“常量”部分，进一步了解常量以及它和变量的区别：
https://doc.rust-lang.org/book/ch03-01-variables-and-mutability.html#constants"""

# FUNCTIONS

[[exercises]]
name = "functions1"
dir = "02_functions"
test = false
hint = """
这个 `main` 函数正在调用一个它认为应该存在的函数，但该函数并不存在。它要求这个函数名为 `call_me`，不接收任何参数，也不返回任何值。是不是和 `main` 很像？"""

[[exercises]]
name = "functions2"
dir = "02_functions"
test = false
hint = """
Rust 要求函数签名的所有部分都进行类型标注，但 `call_me` 缺少 `num` 的类型标注。"""

[[exercises]]
name = "functions3"
dir = "02_functions"
test = false
hint = """
这一次，函数的*声明*没有问题，但调用函数的位置出了问题。"""

[[exercises]]
name = "functions4"
dir = "02_functions"
test = false
hint = """
错误消息指向函数 `sale_price`，并表示 `->` 后面应该有一个类型。这里应该填写函数的返回类型。
可以参考 `is_even` 函数的写法！"""

[[exercises]]
name = "functions5"
dir = "02_functions"
test = false
hint = """
这是一个非常常见的错误，删除一个字符就能修复。
这是因为 Rust 区分表达式和语句：表达式根据操作数返回一个值，而语句只返回 `()` 类型，它的行为类似于 C/C++ 中的 `void`。

我们希望 `square` 函数返回 `i32` 类型的值，但它当前返回的是 `()` 类型。

有两种解决方案：
1. 在 `num * num;` 前添加 `return` 关键字。
2. 删除 `num * num` 后面的分号 `;`。"""

# IF

[[exercises]]
name = "if1"
dir = "03_if"
hint = """
如果愿意，你可以把这段代码写成一行！

其他语言中的类似示例：
- 在 C(++) 中可以写成：`a > b ? a : b`
- 在 Python 中可以写成：`a if a > b else b`

请记住，Rust 中：
- `if` 条件不需要用括号包围。
- `if`/`else` 条件结构是表达式。
- 每个条件后面都跟着一个 `{}` 代码块。"""

[[exercises]]
name = "if2"
dir = "03_if"
hint = """
针对第一个编译器错误，需要注意：Rust 要求每个条件代码块返回相同的类型！

要让测试通过，你需要添加几个条件来检查不同的输入值。阅读测试，看看它们期望什么结果。"""

[[exercises]]
name = "if3"
dir = "03_if"
hint = """
在 Rust 中，`if` 表达式的每个分支都必须返回相同类型的值。
确保所有分支的类型保持一致。"""

# QUIZ 1

[[exercises]]
name = "quiz1"
dir = "quizzes"
hint = "这次没有提示 ;)"

# PRIMITIVE TYPES

[[exercises]]
name = "primitive_types1"
dir = "04_primitive_types"
test = false
hint = """
在 Rust 中，可以在布尔值前使用 `!` 运算符进行否定。
示例：`!true == false`
对布尔变量也同样适用。"""

[[exercises]]
name = "primitive_types2"
dir = "04_primitive_types"
test = false
hint = "这次没有提示 ;)"

[[exercises]]
name = "primitive_types3"
dir = "04_primitive_types"
test = false
hint = """
有一种简写方式可以初始化指定大小的数组，不需要你输入 100 个元素（当然，如果你愿意，也可以这样做）。

例如：
```
let array = ["Are we there yet?"; 100];
```

加分问题：对于 `a.len() >= 100`，还有哪些内容可以让它返回 `true`？"""

[[exercises]]
name = "primitive_types4"
dir = "04_primitive_types"
hint = """
请阅读《Rust 程序设计语言》中的“理解所有权 -> 切片类型 -> 其他切片”部分：https://doc.rust-lang.org/book/ch04-03-slices.html，然后使用数组中目标元素的起始索引和结束索引（再加一）来创建切片。

如果你想知道为什么 `assert_eq!` 的第一个参数没有使用引用符号 `&`，而第二个参数却是引用，可以阅读 Nomicon 中关于强制转换的章节：
https://doc.rust-lang.org/nomicon/coercions.html"""

[[exercises]]
name = "primitive_types5"
dir = "04_primitive_types"
test = false
hint = """
请阅读《Rust 程序设计语言》中的“数据类型 -> 元组类型”部分：
https://doc.rust-lang.org/book/ch03-02-data-types.html#the-tuple-type
尤其关注结构解构部分（该章节倒数第二个示例）。

你需要编写一个模式，将 `name` 和 `age` 绑定到元组中对应的部分。"""

[[exercises]]
name = "primitive_types6"
dir = "04_primitive_types"
hint = """
虽然这里可以使用解构 `let` 处理元组，但请按照《Rust 程序设计语言》“数据类型 -> 元组类型”部分最后一个示例的说明，尝试改用索引访问：
https://doc.rust-lang.org/book/ch03-02-data-types.html#the-tuple-type
现在你的工具箱里又多了一件工具！"""

# VECS

[[exercises]]
name = "vecs1"
dir = "05_vecs"
hint = """
在 Rust 中，有两种定义 Vector 的基本方式：
1. 使用 `Vec::new()` 函数创建新向量，然后用 `push()` 方法填充它。
2. 使用 `vec![]` 宏，并在方括号中定义元素。当你明确知道初始值时，这种方式更简单。

请阅读《Rust 程序设计语言》的这一章节，进一步了解相关内容：https://doc.rust-lang.org/book/ch08-01-vectors.html"""

[[exercises]]
name = "vecs2"
dir = "05_vecs"
hint = """
使用向量的 `.push()` 方法向其中添加新元素。"""

# MOVE SEMANTICS

[[exercises]]
name = "move_semantics1"
dir = "06_move_semantics"
hint = """
你在向量中添加元素的那一行遇到了“不能将 `vec` 作为可变对象借用，因为它没有声明为可变”的错误，对吧？

修复方法是添加一个关键字，而且这个关键字并不加在向量添加元素的那一行（也就是报错的那一行）。

试着在调用 `fill_vec()` 后访问 `vec0`，看看会发生什么！"""

[[exercises]]
name = "move_semantics2"
dir = "06_move_semantics"
hint = """
第一次运行这个练习时，你会看到“借用了已移动的值”错误。在 Rust 中，当参数传递给函数且没有被显式返回时，就不能再使用原来的变量。我们称这种操作为“移动”变量。当我们把 `vec0` 传给 `fill_vec` 时，它会被“移动”到 `vec1` 中，这意味着我们不能再访问 `vec0`。

你可以为 `vec0` 中的数据创建另一个独立副本，再把这个副本传给 `fill_vec`。在 Rust 中，这叫作克隆。"""

[[exercises]]
name = "move_semantics3"
dir = "06_move_semantics"
hint = """
本练习与前几个练习的区别在于，`fn fill_vec` 中原本包含 `let mut vec = vec;` 的第一行已经不在了。你不必把那一行加回来，只需要在一个位置添加 `mut`，就能将已有绑定从不可变绑定改为可变绑定 :)"""

[[exercises]]
name = "move_semantics4"
dir = "06_move_semantics"
hint = """
仔细思考每个可变引用的作用域范围。在获取可变引用后立即更新 `x` 的值，会有帮助吗？
你可以在《Rust 程序设计语言》的“引用和借用”章节中阅读“可变引用”部分：
https://doc.rust-lang.org/book/ch04-02-references-and-borrowing.html#mutable-references."""

[[exercises]]
name = "move_semantics5"
dir = "06_move_semantics"
test = false
hint = """
你可以参考《Rust 程序设计语言》的“引用和借用”章节来寻找答案：
https://doc.rust-lang.org/book/ch04-02-references-and-borrowing.html

第一个问题是 `get_char` 获取了字符串的所有权。因此 `data` 被移动，不能再用于 `string_uppercase`。`data` 先被移动到 `get_char`，这意味着 `string_uppercase` 无法操作这份数据。

修复这一点后，还需要调整 `string_uppercase` 的函数签名。"""

# STRUCTS

[[exercises]]
name = "structs1"
dir = "07_structs"
hint = """
Rust 中不止一种结构体，实际上有三种。它们都可以用来打包相关数据。

普通结构体是存储在字段中的相关数据的命名集合。

元组结构体本质上就是有名称的元组。

最后是单元结构体。它们没有任何字段，在泛型中很有用。

在本练习中，你需要分别补全并实现这三种结构体中的一个。
请在《Rust 程序设计语言》中进一步了解结构体：
https://doc.rust-lang.org/book/ch05-01-defining-structs.html"""

[[exercises]]
name = "structs2"
dir = "07_structs"
hint = """
创建结构体实例很简单，只需给它的字段赋值即可。

不过，在实例化结构体时还有一些可以使用的简写方式。
请阅读《Rust 程序设计语言》了解更多内容：
https://doc.rust-lang.org/book/ch05-01-defining-structs.html#creating-instances-from-other-instances-with-struct-update-syntax"""

[[exercises]]
name = "structs3"
dir = "07_structs"
hint = """
方法和关联函数都声明在 `impl MyType {}` 代码块中。方法有一个 `self`、`&self` 或 `&mut self` 参数，其中 `self` 隐式使用 impl 代码块的类型。关联函数没有 `self` 参数。

请阅读《Rust 程序设计语言》了解更多方法实现相关内容：
https://doc.rust-lang.org/book/ch05-03-method-syntax.html"""


name: Check

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Clippy
        run: cargo clippy -- --deny warnings
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: rustfmt
        run: cargo fmt --all --check
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: swatinem/rust-cache@v2
      - name: cargo test
        env:
          RUST_BACKTRACE: 1
        run: cargo test --workspace
  dev-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: swatinem/rust-cache@v2
      - name: rustlings dev check
        run: cargo dev check --require-solutions
  rumdl:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v7
        - uses: rvben/rumdl@v0
  translation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Fetch official upstream
        run: |
          git remote add upstream https://github.com/rust-lang/rustlings.git
          git fetch --no-tags --depth=1 upstream main
      - name: Test translation checker
        run: python scripts/test_check_translation.py
      - name: Check Chinese coverage and upstream drift
        run: python scripts/check_translation.py --upstream-ref FETCH_HEAD
      - name: Check whitespace
        run: git diff --check
